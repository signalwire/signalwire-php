name: Test

# Runs the full per-port CI gate set: phpunit, signature regen, drift
# against the Python reference, and the no-cheat-tests audit. Mirrors
# `bash scripts/run-ci.sh` so there's no drift between local and CI.

env:
  # Opt into Node.js 24 ahead of GitHub's 2026-06-02 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - name: Checkout signalwire-php
        uses: actions/checkout@v5
        with:
          path: signalwire-php

      - name: Checkout porting-sdk (mock_relay + mock_signalwire test harnesses)
        uses: actions/checkout@v5
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      # The EMISSION gate compares this port's to_dict() output against the
      # signalwire-python oracle (FunctionResult), which pulls fastapi via
      # signalwire/__init__. Check it out so the EMISSION gate has its reference.
      - name: Checkout signalwire-python (EMISSION oracle)
        uses: actions/checkout@v5
        with:
          repository: signalwire/signalwire-python
          path: signalwire-python
          ref: main

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          # composer.json requires php >= 8.2; test the declared floor (8.2),
          # current stable (8.3), and latest (8.4) via the matrix. All have the
          # json/openssl/mbstring extensions enabled by default.
          php-version: ${{ matrix.php }}
          extensions: json, openssl, mbstring
          coverage: none
          tools: composer:v2

      - name: Set up Python (porting-sdk audit scripts)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      # EMISSION needs `import signalwire` (the oracle). Install from the
      # adjacent checkout only if not already importable.
      - name: Install signalwire-python (EMISSION oracle) if not importable
        run: |
          if python -c "import signalwire.core.function_result" 2>/dev/null; then
            echo "signalwire-python already importable; skipping install"
          else
            pip install ./signalwire-python
          fi

      - name: Composer install (PHP deps)
        working-directory: signalwire-php
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run CI gate script (TEST -> SIGNATURES -> DRIFT -> NO-CHEAT)
        working-directory: signalwire-php
        env:
          PORTING_SDK: ${{ github.workspace }}/porting-sdk
        run: bash scripts/run-ci.sh
